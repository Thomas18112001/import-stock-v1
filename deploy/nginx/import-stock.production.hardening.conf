limit_req_zone $binary_remote_addr zone=app_sensitive_rate:10m rate=10r/s;

server {
    listen 80;
    server_name import-stock.woora.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name import-stock.woora.fr;

    # TLS certificates managed by Certbot or your ACME tooling.
    ssl_certificate /etc/letsencrypt/live/import-stock.woora.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/import-stock.woora.fr/privkey.pem;

    # Hardening
    server_tokens off;
    autoindex off;
    client_max_body_size 1m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Dotfiles and sensitive paths
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    location ^~ /.shopify/ { deny all; return 404; }
    location ^~ /deploy/ { deny all; return 404; }
    location = /.env { deny all; return 404; }
    location = /Dockerfile { deny all; return 404; }
    location = /ecosystem.config.cjs { deny all; return 404; }

    # Optional rate limiting on sensitive routes
    location ~ ^/(actions|api/cron)/ {
        limit_req zone=app_sensitive_rate burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
